<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aarong - Children Duty Roster</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Updock&family=Barlow:wght@400;500;600;700&display=swap');

  :root {
    --aarong-green: #0C4B33;      /* Aarong Signature Green */
    --aarong-gold: #D4AF37;       /* Metallic Gold */
    --aarong-cream: #F9F6F0;      /* Premium Cream Background */
    --green-mid: #1e6b1e;
    --green-light: #a3ffa3;
    --green-pale: #d4f7d4;
    --red-light: #ffe3e3;
    --blue-light: #cfe2ff;
    --white: #ffffff;
    --border: #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--aarong-cream);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* ===== AARONG BRANDING HEADER ===== */
  .brand-header {
    text-align: center;
    margin-bottom: 25px;
    border-bottom: 2px solid var(--aarong-gold);
    padding-bottom: 15px;
    width: 100%;
    max-width: 860px;
  }

  .brand-logo {
    font-family: 'Cinzel', serif;
    color: var(--aarong-green);
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: 8px;
    line-height: 1;
    text-transform: uppercase;
  }

  .brand-tagline {
    font-family: 'Updock', cursive;
    color: var(--aarong-gold);
    font-size: 1.8rem;
    margin-top: -5px;
  }

  .roster-title {
    font-family: 'Cinzel', serif;
    color: #333;
    font-size: 1.1rem;
    letter-spacing: 3px;
    margin-top: 10px;
    font-weight: bold;
  }

  /* ===== CONTROLS ===== */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 22px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }

  .controls label {
    color: var(--aarong-green);
    font-weight: 700;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .controls select, .controls input[type="date"] {
    background: var(--white);
    color: var(--aarong-green);
    border: 2px solid var(--aarong-green);
    border-radius: 4px;
    padding: 8px 14px;
    font-size: 1rem;
    font-weight: 600;
    font-family: 'Barlow', sans-serif;
    cursor: pointer;
    outline: none;
    transition: all 0.3s ease;
  }

  .controls select:focus, .controls input[type="date"]:focus {
    border-color: var(--aarong-gold);
    box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
  }

  .controls button {
    background: var(--aarong-green);
    color: var(--white);
    border: 1px solid var(--aarong-gold);
    border-radius: 4px;
    padding: 9px 20px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Cinzel', serif;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.25s ease;
  }
  
  .controls button:hover { 
    background: #062b1d; 
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(12, 75, 51, 0.3);
  }

  .btn-download {
    background: var(--aarong-gold) !important;
    color: var(--aarong-green) !important;
    border-color: var(--aarong-green) !important;
  }
  .btn-download:hover {
    background: #bc982e !important;
    box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3) !important;
  }

  /* ===== MAIN ROSTER CARD ===== */
  .roster-card {
    background: var(--white);
    border: 4px solid var(--aarong-green);
    border-radius: 4px;
    overflow: hidden;
    width: 100%;
    max-width: 860px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    opacity: 0;
  }

  .roster-card.run-animation {
    animation: cardEntrance 0.6s ease-out forwards;
  }

  .roster-body {
    display: flex;
    flex-direction: row;
  }

  @media (max-width: 768px) {
    .roster-body { flex-direction: column; }
    .left-section { border-right: none !important; border-bottom: 4px solid var(--aarong-green); }
  }

  /* ===== LEFT SECTION ===== */
  .left-section {
    flex: 1.1;
    border-right: 4px solid var(--aarong-green);
  }

  .section-header {
    background: var(--aarong-green);
    color: var(--white);
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    padding: 10px 0;
    font-weight: 600;
    border-bottom: 2px solid var(--aarong-gold);
  }

  .children-table {
    width: 100%;
    border-collapse: collapse;
  }

  .children-table th {
    background: #e2ede8;
    color: var(--aarong-green);
    font-weight: 700;
    font-size: 0.95rem;
    padding: 10px;
    border: 1px solid #bbb;
    text-align: center;
    font-family: 'Cinzel', serif;
  }

  .children-table td {
    padding: 7px 10px;
    border: 1px solid #ccc;
    font-size: 0.95rem;
    color: #222;
    font-weight: 600;
    text-align: center;
  }

  .run-animation .children-table tbody tr {
    animation: rowAppear 0.3s ease-out backwards;
  }

  .row-morning { background: #f0f7f4; }
  .row-both { background: #fff3e0; }
  .row-evening { background: #fff5f5; }
  .row-zero { background: #f5f5f5; color: #888; }
  .row-total-label { background: #e3f2fd; font-weight: 700; }
  .row-grand { background: #fff9c4; font-weight: 700; color: var(--aarong-green); }

  /* ===== RIGHT SECTION ===== */
  .right-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #fafafa;
  }

  .offday-header {
    background: var(--aarong-gold);
    color: var(--aarong-green);
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    padding: 10px 0;
    font-weight: 600;
    border-bottom: 2px solid var(--aarong-green);
  }

  .right-table {
    width: 100%;
    border-collapse: collapse;
  }

  .right-table th {
    background: #e2ede8;
    color: var(--aarong-green);
    font-weight: 700;
    font-size: 0.95rem;
    padding: 10px;
    border: 1px solid #bbb;
    text-align: center;
    font-family: 'Cinzel', serif;
  }

  .right-table td {
    padding: 10px 12px;
    border: 1px solid #ccc;
    font-size: 0.95rem;
    color: #222;
    font-weight: 600;
  }

  .offday-row td { background: #fffde6; }
  .offday-names { color: #b30000; font-weight: 700; }

  .leave-header-row td {
    background: var(--aarong-green);
    color: white;
    font-weight: 700;
    text-align: center;
    font-size: 0.95rem;
    letter-spacing: 1px;
    padding: 8px;
    font-family: 'Cinzel', serif;
  }

  .leave-row { background: #fffdf6; }
  .leave-row td:first-child { font-weight: 700; color: #111; }

  .trail-header-row td {
    background: #cd7f32;
    color: white;
    font-weight: 700;
    text-align: center;
    font-size: 0.95rem;
    letter-spacing: 1px;
    padding: 8px;
    font-family: 'Cinzel', serif;
  }

  .trail-row { background: #f4f9f6; }

  .date-cell {
    background: var(--aarong-green);
    color: var(--aarong-gold);
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    padding: 14px;
    border-top: 3px solid var(--aarong-gold);
    margin-top: auto;
    font-weight: bold;
  }

  /* ===== MODAL & CHIPS ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 100;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .modal-overlay.open { display: flex; opacity: 1; }

  .modal {
    background: var(--white);
    border: 3px solid var(--aarong-green);
    border-radius: 4px;
    padding: 24px;
    width: 95%;
    max-width: 540px;
    color: #333;
    max-height: 90vh;
    overflow-y: auto;
    transform: scale(0.8);
    transition: transform 0.3s ease;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  .modal-overlay.open .modal { transform: scale(1); }

  .modal h2 {
    font-family: 'Cinzel', serif;
    color: var(--aarong-green);
    font-size: 1.5rem;
    margin-bottom: 15px;
    letter-spacing: 1px;
    border-bottom: 2px solid var(--aarong-gold);
    padding-bottom: 5px;
  }

  .modal label {
    display: block;
    color: var(--aarong-green);
    margin-top: 14px;
    margin-bottom: 5px;
    font-weight: 700;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .modal input, .modal textarea, .modal select {
    width: 100%;
    background: #fafafa;
    color: #222;
    border: 1px solid #999;
    border-radius: 4px;
    padding: 10px 12px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    outline: none;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus {
    border-color: var(--aarong-green);
  }

  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  
  .btn-save { background: var(--aarong-green); color: white; border: none; border-radius: 4px; padding: 10px 24px; font-weight: 700; cursor: pointer; font-family: 'Cinzel', serif; }
  .btn-cancel { background: #eedddd; color: #7c1a1a; border: 1px solid #ccaaaa; border-radius: 4px; padding: 10px 24px; font-weight: 700; cursor: pointer; font-family: 'Cinzel', serif; }

  .name-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
    background: #f0f4f2;
    padding: 10px;
    border-radius: 4px;
    border: 1px dashed var(--aarong-green);
  }

  .chip {
    background: var(--white);
    border: 1px solid #bbb;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    color: #444;
    user-select: none;
    transition: all 0.2s ease;
  }
  
  .chip.selected { 
    background: var(--aarong-green); 
    border-color: var(--aarong-green); 
    color: var(--white); 
    font-weight: 700;
  }

  @keyframes cardEntrance {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes rowAppear {
    from { opacity: 0; transform: translateX(-5px); }
    to { opacity: 1; transform: translateX(0); }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<!-- ===== AARONG HEADER BRANDING ===== -->
<div class="brand-header">
  <div class="brand-logo">aarong</div>
  <div class="brand-tagline">Tradition Meets Daily Duty</div>
  <div class="roster-title">📋 Children Duty Roster</div>
</div>

<div class="controls">
  <label>Day:</label>
  <select id="daySelect">
    <option value="Saturday">Saturday</option>
    <option value="Sunday">Sunday</option>
    <option value="Monday">Monday</option>
    <option value="Tuesday">Tuesday</option>
    <option value="Wednesday">Wednesday</option>
    <option value="Thursday">Thursday</option>
    <option value="Friday">Friday</option>
  </select>

  <label>Date:</label>
  <input type="date" id="dateInput">

  <button onclick="openEditModal()">✏️ Edit</button>
  <button class="btn-download" onclick="downloadRosterImage()">📥 Download Image</button>
</div>

<div class="roster-card" id="rosterCard"></div>

<!-- ===== EDIT MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>✏️ Edit Day Data</h2>

    <label>Select Day to Edit:</label>
    <select id="editDay">
      <option value="Saturday">Saturday</option>
      <option value="Sunday">Sunday</option>
      <option value="Monday">Monday</option>
      <option value="Tuesday">Tuesday</option>
      <option value="Wednesday">Wednesday</option>
      <option value="Thursday">Thursday</option>
      <option value="Friday">Friday</option>
    </select>

    <label>Morning Shift (select names):</label>
    <div class="name-chips" id="morningChips"></div>

    <label>Evening Shift (select names):</label>
    <div class="name-chips" id="eveningChips"></div>

    <label>Off Day Children (comma separated):</label>
    <input type="text" id="editOffday" placeholder="e.g. Yeasmin,Sumaya,Jiniya">

    <label>Leave Data (one per line: Name L18,E19 ...):</label>
    <textarea id="editLeave" placeholder="Arpita L18,E19,M22&#10;ratan L18,L20(bh)"></textarea>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">💾 Save</button>
    </div>
  </div>
</div>

<script>
// পেজে ঢোকা মাত্রই বা রিফ্রেশ দিলেই LocalStorage ক্লিয়ার হয়ে যাবে
localStorage.removeItem('rosterData');
localStorage.removeItem('lastSelectedDay');
localStorage.setItem('isRefreshed', 'true');

const ALL_CHILDREN = [
  "Onti","Rida","Runu","Anika","Hasib","Saied","Suikraching",
  "Juie","Afrain","Nafisa","Ashik","Abrar","Mou","Arpita","Anila","Ratan","Alvee",
  "Yeasmin","Sumaya","Jiniya","Arifa","Ashiq"
];

// আপনার অরিজিনাল ডিফল্ট ডাটা ব্যাকআপ
let defaultData = {
  Saturday: { morning: ["Juie","Yeasmin","Rida","Anila","Sumaya","Afrain","Alvee"], evening: ["Runu","Mou","Onti","Jiniya","Nafisa","Arifa","Saied","Ashik","Suikraching"], offday: [], leave: {} },
  Sunday: { morning: ["Yeasmin","Onti","Nafisa","Saied","Anika","Ashik","Suikraching"], evening: ["Juie","Arifa","Afrain","Runu","Arpita","Jiniya","Sumaya","Alvee","Ratan"], offday: [], leave: {} },
  Monday: { morning: ["Mou","Juie","Sumaya","Runu","Ratan","Alvee","Afrain"], evening: ["Yeasmin","Jiniya","Suikraching","Onti","Ashik","Arpita","Hasib","Anika","Anila","Rida"], offday: [], leave: {} },
  Tuesday: { morning: ["Onti","Rida","Runu","Anika","Hasib","Saied","Suikraching"], evening: ["Juie","Afrain","Nafisa","Ashik","Mou","Arpita","Anila","Ratan","Alvee"], offday: ["Yeasmin","Sumaya","Jiniya"], leave: { "Arpita": "L18,E19,M22", "ratan": "L18,L20(bh)" } },
  Wednesday: { morning: ["Juie","Yeasmin","Hasib","Nafisa","Anila","Sumaya","Alvee"], evening: ["Mou","Saied","Arifa","Rida","Jiniya","Runu","Anika","Arpita","Suikraching","Ratan"], offday: [], leave: {} },
  Thursday: { morning: ["Mou","Hasib","Rida","Arpita","Yeasmin","Anika","Saied"], evening: ["Onti","Sumaya","Runu","Nafisa","Anila","Afrain","Jiniya","Arifa","Ashiq","Ratan"], offday: [], leave: {} },
  Friday: { morning: ["Onti","Mou","Afrain","Anila","Nafisa","Suikraching","Ratan"], evening: ["Sumaya","Jiniya","Saied","Juie","Arifa","Yeasmin","Arpita","Ashik","Rida","Hasib","Anika","Alvee"], offday: [], leave: {} }
};

let rosterData = defaultData;

function formatDisplayDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  return d.toLocaleDateString('en-US', opts);
}

function render() {
  const card = document.getElementById('rosterCard');
  card.classList.remove('run-animation');

  const day = document.getElementById('daySelect').value;
  const dateVal = document.getElementById('dateInput').value;
  const data = rosterData[day];

  if (!data) return;

  const morningSet = new Set(data.morning);
  const eveningSet = new Set(data.evening);

  let morningRows = '';
  let bothRows = '';
  let eveningRows = '';
  let morningTotal = data.morning ? data.morning.length : 0;
  let eveningTotal = data.evening ? data.evening.length : 0;
  let index = 0;

  ALL_CHILDREN.forEach(name => {
    const isMorning = morningSet.has(name);
    const isEvening = eveningSet.has(name);
    let delay = (index * 0.02) + 's';

    if (isMorning && isEvening) {
      bothRows += `<tr class="row-both" style="animation-delay: ${delay}"><td>${name}</td><td>1</td><td>1</td></tr>`;
      index++;
    } else if (isMorning) {
      morningRows += `<tr class="row-morning" style="animation-delay: ${delay}"><td>${name}</td><td>1</td><td></td></tr>`;
      index++;
    } else if (isEvening) {
      eveningRows += `<tr class="row-evening" style="animation-delay: ${delay}"><td>${name}</td><td></td><td>1</td></tr>`;
      index++;
    }
  });

  let tableRows = morningRows + bothRows + eveningRows;
  let leaveRows = '';
  const leaveEntries = data.leave ? Object.entries(data.leave) : [];
  
  if (leaveEntries.length === 0) {
    leaveRows = `<tr class="leave-row"><td colspan="2" style="text-align:center;color:#777;font-style:italic;">No leave data</td></tr>`;
  } else {
    leaveEntries.forEach(([name, info]) => {
      leaveRows += `<tr class="leave-row"><td>${name}</td><td>${info}</td></tr>`;
    });
  }

  const offdayNames = (data.offday && data.offday.length > 0) ? data.offday.join(', ') : '—';
  const dateDisplay = dateVal ? formatDisplayDate(dateVal) : day;

  card.innerHTML = `
    <div class="roster-body">
      <div class="left-section">
        <div class="section-header">CHILDREN</div>
        <table class="children-table">
          <thead>
            <tr><th>Name</th><th>Morning</th><th>Evening</th></tr>
          </thead>
          <tbody>
            ${tableRows}
            <tr class="row-zero" style="animation-delay: ${(index * 0.02) + 's'}"><td>0</td><td></td><td></td></tr>
            <tr class="row-total-label" style="animation-delay: ${((index + 1) * 0.02) + 's'}">
              <td>Total</td>
              <td>${morningTotal}</td>
              <td>${eveningTotal}</td>
            </tr>
            <tr class="row-grand" style="animation-delay: ${((index + 2) * 0.02) + 's'}">
              <td colspan="2" style="text-align:right;">TOTAL=</td>
              <td>${morningTotal + eveningTotal}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="right-section">
        <div class="offday-header">OFFDAY</div>
        <table class="right-table">
          <thead><tr><th>Dep</th><th>Name</th></tr></thead>
          <tbody>
            <tr class="offday-row"><td>CHILDREN</td><td class="offday-names">${offdayNames}</td></tr>
            <tr><td colspan="2" style="background:#fff;height:6px;"></td></tr>
            <tr class="leave-header-row"><td colspan="2">Leave Data</td></tr>
            ${leaveRows}
            <tr><td colspan="2" style="background:#fff;height:6px;"></td></tr>
            <tr class="trail-header-row"><td colspan="2">Trail</td></tr>
            <tr class="trail-row"><td>Morning</td><td></td></tr>
            <tr class="trail-row"><td>Evening</td><td></td></tr>
          </tbody>
        </table>
        <div class="date-cell" id="bottomDateCell">${dateDisplay}</div>
      </div>
    </div>
  `;

  setTimeout(() => { card.classList.add('run-animation'); }, 10);
}

function downloadRosterImage() {
  const rosterCard = document.getElementById('rosterCard');
  const selectedDay = document.getElementById('daySelect').value;
  const selectedDate = document.getElementById('dateInput').value || 'roster';

  rosterCard.classList.remove('run-animation');
  rosterCard.style.opacity = '1'; 

  html2canvas(rosterCard, {
    scale: 2, 
    backgroundColor: '#ffffff',
    useCORS: true,
    logging: false
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = `Aarong_Roster_${selectedDay}_${selectedDate}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    rosterCard.classList.add('run-animation');
  });
}

function openEditModal() {
  const day = document.getElementById('daySelect').value;
  document.getElementById('editDay').value = day;
  buildChips(day);
  const data = rosterData[day];
  document.getElementById('editOffday').value = data.offday ? data.offday.join(',') : '';
  document.getElementById('editLeave').value = data.leave ? Object.entries(data.leave).map(([k,v])=>`${k} ${v}`).join('\n') : '';
  
  const modalOverlay = document.getElementById('modalOverlay');
  modalOverlay.style.display = 'flex';
  setTimeout(() => { modalOverlay.classList.add('open'); }, 10);
}

function closeEditModal() {
  const modalOverlay = document.getElementById('modalOverlay');
  modalOverlay.classList.remove('open');
  setTimeout(() => { modalOverlay.style.display = 'none'; }, 300);
}

function buildChips(day) {
  const data = rosterData[day];
  const morningDiv = document.getElementById('morningChips');
  const eveningDiv = document.getElementById('eveningChips');

  morningDiv.innerHTML = '';
  eveningDiv.innerHTML = '';

  ALL_CHILDREN.forEach(name => {
    const mSelect = data.morning && data.morning.includes(name);
    const mChip = document.createElement('span');
    mChip.className = 'chip' + (mSelect ? ' selected' : '');
    mChip.textContent = name;
    mChip.onclick = () => mChip.classList.toggle('selected');
    morningDiv.appendChild(mChip);

    const eSelect = data.evening && data.evening.includes(name);
    const eChip = document.createElement('span');
    eChip.className = 'chip' + (eSelect ? ' selected' : '');
    eChip.textContent = name;
    eChip.onclick = () => eChip.classList.toggle('selected');
    eveningDiv.appendChild(eChip);
  });
}

function saveEdit() {
  const day = document.getElementById('editDay').value;
  const morning = [...document.querySelectorAll('#morningChips .chip.selected')].map(c => c.textContent);
  const evening = [...document.querySelectorAll('#eveningChips .chip.selected')].map(c => c.textContent);
  const offdayRaw = document.getElementById('editOffday').value;
  const offday = offdayRaw.split(',').map(s=>s.trim()).filter(Boolean);
  const leaveRaw = document.getElementById('editLeave').value;
  const leave = {};

  leaveRaw.split('\n').forEach(line => {
    const parts = line.trim().split(' ');
    if (parts.length >= 2) {
      const name = parts[0];
      const info = parts.slice(1).join(' ');
      leave[name] = info;
    }
  });

  rosterData[day] = { morning, evening, offday, leave };
  
  // এডিট করার পর সাময়িক সেশনে ডেটা সেভ থাকবে রিফ্রেশ না দেওয়া পর্যন্ত
  localStorage.setItem('rosterData', JSON.stringify(rosterData));

  document.getElementById('daySelect').value = day;
  closeEditModal();
  render();
}

function initApp() {
  // বাংলাদেশ টাইম জোনে আজকের দিন সেট করা
  const bdTimeString = new Date().toLocaleString("en-US", { timeZone: "Asia/Dhaka" });
  const bdDate = new Date(bdTimeString);

  const year = bdDate.getFullYear();
  const month = String(bdDate.getMonth() + 1).padStart(2, '0');
  const day = String(bdDate.getDate()).padStart(2, '0');
  const formattedDate = `${year}-${month}-${day}`;

  const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  const dayName = daysOfWeek[bdDate.getDay()];

  document.getElementById('dateInput').value = formattedDate;
  document.getElementById('daySelect').value = dayName;
  
  render();
}

initApp();

document.getElementById('dateInput').addEventListener('change', function() {
  if (this.value) {
    const d = new Date(this.value + 'T00:00:00');
    const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    document.getElementById('daySelect').value = daysOfWeek[d.getDay()];
  }
  render();
});

document.getElementById('daySelect').addEventListener('change', function() {
  const selectedDay = this.value;
  const currentDateVal = document.getElementById('dateInput').value;
  
  if (currentDateVal) {
    const currentD = new Date(currentDateVal + 'T00:00:00');
    const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    const currentDayIndex = currentD.getDay();
    const targetDayIndex = daysOfWeek.indexOf(selectedDay);
    
    let dayDiff = targetDayIndex - currentDayIndex;
    currentD.setDate(currentD.getDate() + dayDiff);
    
    const year = currentD.getFullYear();
    const month = String(currentD.getMonth() + 1).padStart(2, '0');
    const day = String(currentD.getDate()).padStart(2, '0');
    
    document.getElementById('dateInput').value = `${year}-${month}-${day}`;
  }
  render();
});

document.getElementById('editDay').addEventListener('change', function() {
  buildChips(this.value);
  const data = rosterData[this.value];
  document.getElementById('editOffday').value = data.offday ? data.offday.join(',') : '';
  document.getElementById('editLeave').value = data.leave ? Object.entries(data.leave).map(([k,v])=>`${k} ${v}`).join('\n') : '';
});
</script>
